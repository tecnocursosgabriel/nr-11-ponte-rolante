name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Montar pasta do site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='scripts' \
            --exclude='.cursor-activity' \
            --exclude='generate-audios.js' \
            --exclude='audio-data.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='*.pptx' \
            --exclude='*.pdf' \
            --exclude='videos' \
            ./ _site/
          touch _site/.nojekyll

      - name: Configurar Pages
        uses: actions/configure-pages@v6

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
